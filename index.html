<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>lilith.work</title>
</head>
<body>

<!-- spotify embed -->
<div class="spotify-card">
    <iframe
        src="https://open.spotify.com/embed/playlist/7mis9AIzmpWjUjtPjw23LY?utm_source=generator&theme=0"
        width="100%"
        height="152"
        frameBorder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
    ></iframe>
</div>

<script>
/* ── generate twinkling stars ── */
(function () {
    const COUNT = 80;
    const body = document.body;

    for (let i = 0; i < COUNT; i++) {
        const star = document.createElement('div');
        star.classList.add('star');

        const size = Math.random() < 0.2
            ? Math.floor(Math.random() * 10 + 16)   // large
            : Math.floor(Math.random() * 8 + 6);     // small

        if (size >= 16) star.classList.add('large');

        star.style.setProperty('--size', size + 'px');
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.setProperty('--dur', (Math.random() * 4 + 2) + 's');
        star.style.setProperty('--delay', (Math.random() * 5) + 's');
        star.style.setProperty('--peak', (Math.random() * 0.5 + 0.4).toFixed(2));

        body.appendChild(star);
    }
})();

</script>
    <head><style>
  :root {
    --yuji-speed: 18s;
    --yuji-y: 82%;
  }

  .yuji-wrap {
    position: fixed;
    top: var(--yuji-y);
    left: 0;
    width: 100%;
    height: 0;
    pointer-events: none;
    z-index: 9999;
    overflow: visible;
  }

  .yuji-mover {
    position: absolute;
    pointer-events: auto;
    animation: yujiSlide var(--yuji-speed) linear infinite;
    cursor: pointer;
  }

  .yuji-head {
    width: 48px;
    height: 48px;
    image-rendering: auto;
    animation: yujiBob 1.6s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.25));
    transition: transform 0.2s ease;
  }

  .yuji-mover:hover .yuji-head {
    transform: scale(1.15);
  }

  .yuji-bubble {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) scale(0.7);
    background: #1a1a2e;
    color: #e0dfe6;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 13px;
    line-height: 1.4;
    padding: 8px 14px;
    border-radius: 10px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    letter-spacing: 0.01em;
  }

  .yuji-bubble::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1a1a2e;
  }

  .yuji-mover:hover .yuji-bubble {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  @keyframes yujiSlide {
    0% {
      right: -60px;
    }
    100% {
      right: calc(100% + 60px);
    }
  }

  @keyframes yujiBob {
    0%,
    100% {
      transform: translateY(0);
    }
    20% {
      transform: translateY(-6px);
    }
    40% {
      transform: translateY(0);
    }
    55% {
      transform: translateY(-3px);
    }
    70% {
      transform: translateY(0);
    }
  }
</style>
