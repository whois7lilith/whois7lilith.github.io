  <script>
  const elements = {
    clawMachine: document.querySelector('.claw-machine'),
    box: document.querySelector('.box'),
    collectionBox: document.querySelector('.collection-box'),
    collectionArrow: document.querySelector('.collection-arrow'),
    toys: [],
  }

  const settings = {
    targetToy: null,
    collectedNumber: 0,
  }

  const m = 2
  const toys = {
    bear: { w: 20 * m, h: 27 * m },
    bunny: { w: 20 * m, h: 29 * m },
    golem: { w: 20 * m, h: 27 * m },
    cucumber: { w: 16 * m, h: 28 * m },
    penguin: { w: 24 * m, h: 22 * m },
    robot: { w: 20 * m, h: 30 * m },
  }

  const sortedToys = [...Object.keys(toys), ...Object.keys(toys)].sort(() => 0.5 - Math.random())
  const cornerBuffer = 16
  const machineBuffer = { x: 36, y: 16 }
  const radToDeg = rad => Math.round(rad * (180 / Math.PI))
  const calcX = (i, n) => i % n
  const calcY = (i, n) => Math.floor(i / n)

  const { width: machineWidth, height: machineHeight, top: machineTop } = document.querySelector('.claw-machine').getBoundingClientRect()
  const { height: machineTopHeight } = document.querySelector('.machine-top').getBoundingClientRect()
  const { height: machineBottomHeight, top: machineBottomTop } = document.querySelector('.machine-bottom').getBoundingClientRect()
  const maxArmLength = machineBottomTop - machineTop - machineBuffer.y

  const adjustAngle = angle => {
    const adjustedAngle = angle % 360
    return adjustedAngle < 0 ? adjustedAngle + 360 : adjustedAngle
  }

  const randomN = (min, max) => Math.round(min - 0.5 + Math.random() * (max - min + 1))

  class Button {
    constructor({ className, action, isLocked, pressAction, releaseAction }) {
      Object.assign(this, { el: document.querySelector(`.${className}`), isLocked })
      this.el.addEventListener('click', action || (() => {}))
      ;['mousedown', 'touchstart'].forEach(a => this.el.addEventListener(a, pressAction))
      ;['mouseup', 'touchend'].forEach(a => this.el.addEventListener(a, releaseAction))
      if (!isLocked) this.activate()
    }
    activate() { this.isLocked = false; this.el.classList.add('active') }
    deactivate() { this.isLocked = true; this.el.classList.remove('active') }
  }

  class WorldObject {
    constructor(props) {
      Object.assign(this, { x: 0, y: 0, z: 0, angle: 0, transformOrigin: { x: 0, y: 0 }, interval: null, default: {}, moveWith: [], el: props.className && document.querySelector(`.${props.className}`), ...props })
      this.setStyles()
      if (props.className) { const { width, height } = this.el.getBoundingClientRect(); this.w = width; this.h = height }
      ;['x', 'y', 'w', 'h'].forEach(key => { this.default[key] = this[key] })
    }
    setStyles() {
      Object.assign(this.el.style, { left: `${this.x}px`, top: !this.bottom && `${this.y}px`, bottom: this.bottom, width: `${this.w}px`, height: `${this.h}px`, transformOrigin: this.transformOrigin })
      this.el.style.zIndex = this.z
    }
    setClawPos(clawPos) { this.clawPos = clawPos }
    setTransformOrigin(transformOrigin) { this.transformOrigin = transformOrigin === 'center' ? 'center' : `${transformOrigin.x}px ${transformOrigin.y}px`; this.setStyles() }
    handleNext(next) { clearInterval(this.interval); if (next) next() }
    resumeMove({ moveKey, target, moveTime, next }) { this.interval = null; this.move({ moveKey, target, moveTime, next }) }
    resizeShadow() { elements.box.style.setProperty('--scale', 0.5 + this.h / maxArmLength / 2) }
    move({ moveKey, target, moveTime, next }) {
      if (this.interval) { this.handleNext(next) }
      else {
        const moveTarget = target || this.default[moveKey]
        this.interval = setInterval(() => {
          const distance = Math.abs(this[moveKey] - moveTarget) < 10 ? Math.abs(this[moveKey] - moveTarget) : 10
          const increment = this[moveKey] > moveTarget ? -distance : distance
          if (increment > 0 ? this[moveKey] < moveTarget : this[moveKey] > moveTarget) {
            this[moveKey] += increment; this.setStyles()
            if (moveKey === 'h') this.resizeShadow()
            if (this.moveWith.length) { this.moveWith.forEach(obj => { if (!obj) return; obj[moveKey === 'h' ? 'y' : moveKey] += increment; obj.setStyles() }) }
          } else { this.handleNext(next) }
        }, moveTime || 100)
      }
    }
    distanceBetween(target) { return Math.round(Math.sqrt(Math.pow(this.x - target.x, 2) + Math.pow(this.y - target.y, 2))) }
  }

  class Toy extends WorldObject {
    constructor(props) {
      const toyType = sortedToys[props.index]
      const size = toys[toyType]
      super({ el: Object.assign(document.createElement('div'), { className: `toy pix ${toyType}` }), x: cornerBuffer + calcX(props.index, 4) * ((machineWidth - cornerBuffer * 3) / 4) + size.w / 2 + randomN(-6, 6), y: machineBottomTop - machineTop + cornerBuffer + calcY(props.index, 4) * ((machineBottomHeight - cornerBuffer * 2) / 3) - size.h / 2 + randomN(-2, 2), z: 0, toyType, ...size, ...props })
      elements.box.append(this.el)
      const toy = this
      this.el.addEventListener('click', () => this.collectToy(toy))
      elements.toys.push(this)
    }
    collectToy(toy) {
      toy.el.classList.remove('selected')
      toy.x = machineWidth / 2 - toy.w / 2; toy.y = machineHeight / 2 - toy.h / 2; toy.z = 7
      toy.el.style.setProperty('--rotate-angle', '0deg')
      toy.setTransformOrigin('center')
      toy.el.classList.add('display')
      elements.clawMachine.classList.add('show-overlay')
      settings.collectedNumber++
      elements.collectionBox.appendChild(Object.assign(document.createElement('div'), { className: `toy-wrapper ${settings.collectedNumber > 6 ? 'squeeze-in' : ''}`, innerHTML: `<div class="toy pix ${toy.toyType}"></div>` }))
      setTimeout(() => { elements.clawMachine.classList.remove('show-overlay'); if (!document.querySelector('.selected')) elements.collectionArrow.classList.remove('active') }, 1000)
    }
    setRotateAngle() {
      const angle = radToDeg(Math.atan2(this.y + this.h / 2 - this.clawPos.y, this.x + this.w / 2 - this.clawPos.x)) - 90
      const adjustedAngle = Math.round(adjustAngle(angle))
      this.angle = adjustedAngle < 180 ? adjustedAngle * -1 : 360 - adjustedAngle
      this.el.style.setProperty('--rotate-angle', `${this.angle}deg`)
    }
  }

  elements.box.style.setProperty('--shadow-pos', `${maxArmLength}px`)
  const armJoint = new WorldObject({ className: 'arm-joint' })
  const vertRail = new WorldObject({ className: 'vert', moveWith: [null, armJoint] })
  const arm = new WorldObject({ className: 'arm' })
  armJoint.resizeShadow()

  armJoint.move({ moveKey: 'y', target: machineTopHeight - machineBuffer.y, moveTime: 50, next: () => vertRail.resumeMove({ moveKey: 'x', target: machineBuffer.x, moveTime: 50, next: () => { Object.assign(armJoint.default, { y: machineTopHeight - machineBuffer.y, x: machineBuffer.x }); Object.assign(vertRail.default, { x: machineBuffer.x }); activateHoriBtn() } }) })

  const doOverlap = (a, b) => b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h

  const getClosestToy = () => {
    const claw = { y: armJoint.y + maxArmLength + machineBuffer.y + 7, x: armJoint.x + 7, w: 40, h: 32 }
    const overlappedToys = elements.toys.filter(t => doOverlap(t, claw))
    if (overlappedToys.length) {
      const toy = overlappedToys.sort((a, b) => b.index - a.index)[0]
      toy.setTransformOrigin({ x: claw.x - toy.x, y: claw.y - toy.y })
      toy.setClawPos({ x: claw.x, y: claw.y })
      settings.targetToy = toy
    }
  }

  new Array(12).fill('').forEach((_, i) => { if (i === 8) return; new Toy({ index: i }) })

  const stopHoriBtnAndActivateVertBtn = () => { armJoint.interval = null; horiBtn.deactivate(); vertBtn.activate() }
  const activateHoriBtn = () => { horiBtn.activate(); [vertRail, armJoint, arm].forEach(c => (c.interval = null)) }

  const dropToy = () => {
    arm.el.classList.add('open')
    if (settings.targetToy) { settings.targetToy.z = 3; settings.targetToy.move({ moveKey: 'y', target: machineHeight - settings.targetToy.h - 30, moveTime: 50 }); [vertRail, armJoint, arm].forEach(obj => (obj.moveWith[0] = null)) }
    setTimeout(() => { arm.el.classList.remove('open'); activateHoriBtn(); if (settings.targetToy) { settings.targetToy.el.classList.add('selected'); elements.collectionArrow.classList.add('active'); settings.targetToy = null } }, 700)
  }

  const grabToy = () => {
    if (settings.targetToy) { [vertRail, armJoint, arm].forEach(obj => (obj.moveWith[0] = settings.targetToy)); settings.targetToy.setRotateAngle(); settings.targetToy.el.classList.add('grabbed') }
    else { arm.el.classList.add('missed') }
  }

  const horiBtn = new Button({ className: 'hori-btn', isLocked: true, pressAction: () => { arm.el.classList.remove('missed'); vertRail.move({ moveKey: 'x', target: machineWidth - armJoint.w - machineBuffer.x, next: stopHoriBtnAndActivateVertBtn }) }, releaseAction: () => { clearInterval(vertRail.interval); stopHoriBtnAndActivateVertBtn() } })

  const vertBtn = new Button({ className: 'vert-btn', isLocked: true, pressAction: () => { if (vertBtn.isLocked) return; armJoint.move({ moveKey: 'y', target: machineBuffer.y }) }, releaseAction: () => { clearInterval(armJoint.interval); vertBtn.deactivate(); getClosestToy(); setTimeout(() => { arm.el.classList.add('open'); arm.move({ moveKey: 'h', target: maxArmLength, next: () => setTimeout(() => { arm.el.classList.remove('open'); grabToy(); arm.resumeMove({ moveKey: 'h', next: () => { vertRail.resumeMove({ moveKey: 'x', next: () => { armJoint.resumeMove({ moveKey: 'y', next: dropToy }) } }) } }) }, 500) }) }, 500) } })
  </script>
  <!-- INTERACTIONS -->
  <script>
    // ── Header icon hover labels ──
    const hoverLabel = document.getElementById('header-hover-label');
    document.querySelectorAll('.header-icon').forEach(icon => {
      icon.addEventListener('mouseenter', () => {
        const label = icon.dataset.label;
        if (label) {
          hoverLabel.textContent = label;
          hoverLabel.classList.add('visible');
        }
      });
      icon.addEventListener('mouseleave', () => {
        hoverLabel.classList.remove('visible');
      });
    });

    // ── Sidequests: toggle claw machine ──
    document.getElementById('sidequests-btn').addEventListener('click', e => {
      e.preventDefault(); // claw machine hidden for now
    });
  </script>

  <div id="mini-player">
    <button id="player-close" aria-label="Close">✕</button>
    <div id="player-top">
      <div id="player-art"></div>
      <div id="player-info">
        <div id="player-title">Somewhere Far Away</div>
        <div id="player-artist">lo-fi channel</div>
        <div id="player-tracks">
          <button class="trk active" data-i="0">1</button>
          <button class="trk" data-i="1">2</button>
          <button class="trk" data-i="2">3</button>
          <button class="trk" data-i="3">4</button>
        </div>
      </div>
    </div>
    <div id="player-prog">
      <span id="prog-cur">0:00</span>
      <div id="prog-bar"><div id="prog-fill"></div></div>
      <span id="prog-dur">3:24</span>
    </div>
    <div id="player-ctrls">
      <button class="ctrl" id="btn-prev">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M19 5L9 12l10 7V5z" fill="currentColor"/><rect x="5" y="5" width="2.5" height="14" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="ctrl" id="btn-play">
        <svg id="ico-play" width="16" height="16" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z" fill="currentColor"/></svg>
        <svg id="ico-pause" width="16" height="16" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="4" height="16" rx="1.5" fill="currentColor"/><rect x="15" y="4" width="4" height="16" rx="1.5" fill="currentColor"/></svg>
      </button>
      <button class="ctrl" id="btn-next">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M5 5l10 7L5 19V5z" fill="currentColor"/><rect x="16.5" y="5" width="2.5" height="14" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <style>
    #music-btn {
      position: fixed !important;
      bottom: 40px !important;
      right: 40px !important;
      z-index: 9999 !important;
      pointer-events: all !important;
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer; padding: 0;
      color: #4A5E78;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.18s ease;
    }
    #music-btn:hover { transform: scale(1.1); }

    #mini-player {
      position: fixed !important;
      bottom: 92px !important;
      right: 40px !important;
      z-index: 9998 !important;
      width: 320px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 24px 24px 20px 24px;
      box-shadow: 0 8px 36px rgba(0,0,0,0.13), 0 1px 3px rgba(0,0,0,0.07);
      display: none;
    }
    #player-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(0,0,0,0.07); border: none; border-radius: 50%;
      width: 26px; height: 26px; font-size: 11px; cursor: pointer; color: #555;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all !important;
    }
    #player-close:hover { background: rgba(0,0,0,0.14); }
    #player-top { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 18px; }
    #player-art {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #6a9ac0, #b8c9e8);
    }
    #player-info { flex: 1; padding-top: 4px; }
    #player-title {
      font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
      color: #2A2A2A; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 175px;
    }
    #player-artist { font-family: 'Space Mono', monospace; font-size: 10px; color: #7A7A7A; margin-bottom: 12px; }
    #player-tracks { display: flex; gap: 6px; }
    .trk {
      width: 28px; height: 28px; border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.12); background: transparent;
      font-family: 'Space Mono', monospace; font-size: 11px; color: #555; cursor: pointer;
      pointer-events: all !important;
      display: flex; align-items: center; justify-content: center;
    }
    .trk.active { background: #2A2A2A; color: #fff; border-color: #2A2A2A; }
    .trk:hover:not(.active) { background: rgba(0,0,0,0.06); }
    #player-prog { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
    #prog-cur, #prog-dur { font-family: 'Space Mono', monospace; font-size: 9px; color: #9A9A9A; white-space: nowrap; }
    #prog-bar { flex: 1; height: 3px; background: rgba(0,0,0,0.10); border-radius: 2px; overflow: hidden; }
    #prog-fill { height: 100%; background: #2A2A2A; border-radius: 2px; width: 0%; transition: width 0.1s linear; }
    #player-ctrls {
      display: flex; align-items: center; justify-content: center;
      gap: 0;
    }
    .ctrl {
      flex: 1;
      background: none; border: none; cursor: pointer; color: #3A3A3A;
      display: flex; align-items: center; justify-content: center;
      height: 44px; border-radius: 12px;
      pointer-events: all !important;
    }
    .ctrl:hover { background: rgba(0,0,0,0.05); }
    #btn-play {
      flex: 1.2;
      background: #2A2A2A !important; color: #fff; border-radius: 50%;
      width: 44px; height: 44px; flex: 0 0 44px;
    }
    #btn-play:hover { background: #111 !important; }
    @media (max-width: 768px) {
      #music-btn { bottom: 160px !important; right: 20px !important; }
      #mini-player { bottom: 210px !important; right: 12px !important; width: calc(100vw - 24px); }
    }
  </style>

  <script>
  (function() {
    const tracks = [
      { title: 'Somewhere Far Away', artist: 'lo-fi channel',  bg: 'linear-gradient(135deg,#6a9ac0,#b8c9e8)' },
      { title: 'Late Night Drive',   artist: 'chill beats',    bg: 'linear-gradient(135deg,#c4b8e8,#d4b0e0)' },
      { title: 'City Rain',          artist: 'ambient works',  bg: 'linear-gradient(135deg,#e0aad8,#f0b0d0)' },
      { title: 'Soft Mornings',      artist: 'morning tunes',  bg: 'linear-gradient(135deg,#f0b0d0,#e8a8d0)' },
    ];
    let cur = 0, playing = false, prog = 0, ticker = null;

    const $  = id => document.getElementById(id);
    const mb = $('music-btn'), mp = $('mini-player');

    function showPlayer(v) { mp.style.display = v ? 'block' : 'none'; }

    function loadTrack(i) {
      cur = i;
      const t = tracks[i];
      $('player-title').textContent  = t.title;
      $('player-artist').textContent = t.artist;
      $('player-art').style.background = t.bg;
      document.querySelectorAll('.trk').forEach((b,j) => b.classList.toggle('active', j===i));
      prog = 0; $('prog-fill').style.width = '0%'; $('prog-cur').textContent = '0:00';
    }

    function tick() {
      prog = Math.min(prog + 0.5, 100);
      $('prog-fill').style.width = prog + '%';
      const s = Math.round((prog/100)*204);
      $('prog-cur').textContent = Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');
      if (prog >= 100) { clearInterval(ticker); playing = false; updatePlayBtn(); }
    }

    function updatePlayBtn() {
      $('ico-play').style.display  = playing ? 'none'  : 'block';
      $('ico-pause').style.display = playing ? 'block' : 'none';
    }

    mb.addEventListener('click', () => showPlayer(mp.style.display !== 'block'));
    $('player-close').addEventListener('click', () => showPlayer(false));
    $('btn-play').addEventListener('click', () => {
      playing = !playing;
      updatePlayBtn();
      if (playing) ticker = setInterval(tick, 100); else clearInterval(ticker);
    });
    $('btn-next').addEventListener('click', () => loadTrack((cur+1) % tracks.length));
    $('btn-prev').addEventListener('click', () => loadTrack((cur-1+tracks.length) % tracks.length));
    document.querySelectorAll('.trk').forEach((b,i) => b.addEventListener('click', () => loadTrack(i)));

    loadTrack(0);
  })();
  </script>
